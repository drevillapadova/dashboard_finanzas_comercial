name: ETL Finanzas-Comercial

on:
  schedule:
    # Zona horaria Peru = UTC-5
    # 7:00 AM Lima  = 12:00 UTC
    # 1:00 PM Lima  = 18:00 UTC
    - cron: '0 12 * * *'
    - cron: '0 18 * * *'
  workflow_dispatch:  # ejecución manual desde GitHub

jobs:
  etl:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependencias Python
        run: pip install -r etl/requirements.txt

      - name: Ejecutar ETL
        env:
          EVOLTA_USER:          ${{ secrets.EVOLTA_USER }}
          EVOLTA_PASS:          ${{ secrets.EVOLTA_PASS }}
          AZURE_TENANT_ID:      ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID:      ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET:  ${{ secrets.AZURE_CLIENT_SECRET }}
          SHAREPOINT_HOSTNAME:  ${{ secrets.SHAREPOINT_HOSTNAME }}
          SHAREPOINT_SITE_PATH: ${{ secrets.SHAREPOINT_SITE_PATH }}
          SHAREPOINT_DRIVE_NAME: ${{ secrets.SHAREPOINT_DRIVE_NAME }}
          SHAREPOINT_DASHBOARD_FOLDER: ${{ secrets.SHAREPOINT_DASHBOARD_FOLDER }}
        run: python etl/ETL_Finanzas_Comercial.py
